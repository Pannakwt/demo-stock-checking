<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h1>Hello!</h1>
    <p>Test</p>
    <label><input type="checkbox" value="Coke" onchange="updateTextbox()"> Coke</label><br>
    <label><input type="checkbox" value="Diet Coke" onchange="updateTextbox()"> Diet Coke</label><br>
    <label><input type="checkbox" value="Coke Zero" onchange="updateTextbox()"> Coke Zero</label><br>

    <h3>Textbox</h3>

    <textarea id="textbox" rows="10" cols="30" readonly></textarea>

    <button onclick="copyToClipboard()">Copy to Clipboard</button>

    <script>
    function updateTextbox() {
        var checkboxes = document.querySelectorAll('input[type="checkbox"]');
        var textbox = document.getElementById('textbox');
        var result = "";

        checkboxes.forEach(function(cb) {
            if (cb.checked) {
                result += cb.value + "\n";
            }
        });

        textbox.value = result;
    }

    function copyToClipboard() {
        var textbox = document.getElementById('textbox');
        navigator.clipboard.writeText(textbox.value);
    }
    </script>
</body>
</html>
