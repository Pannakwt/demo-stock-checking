    <h1>Summary</h1>
    <textarea id="textbox" rows="10" cols="30" readonly></textarea><br><br>
    <button onclick="copyToClipboard()">Copy to Clipboard</button>

    <script>
    var counts = {
        "กล่อง 1 หลุม": 1,
        "กล่อง 2 หลุม": 1,
        "Spoon": 1,
        "Fork": 1,
        "Tofu": 1,
        "ไก่ตัว": 1,
        "หมูชิ้น": 1,
        "หมูบด": 1,
        "กุ้งสด": 1,
        "กุ้งผัด": 1
    };

    function changeCount(item, delta) {

        counts[item] += delta;

        if (counts[item] < 1) {
            counts[item] = 1;
        }

        document.getElementById("count-" + item).textContent = counts[item];

        updateTextbox();
    }

    function updateTextbox() {
        var checkboxes = document.querySelectorAll('input[type="checkbox"]');
        var textbox = document.getElementById('textbox');
        var result = "";

        checkboxes.forEach(function(cb) {

            if (cb.checked) {
                
                var count = counts[cb.value];

                if (count > 1){
                    result += cb.value + " (" + count + ")\n";
                } else {
                    result += cb.value + "\n";
                }

            }
        });

        textbox.value = result;
    }

    function applyInput() {
        var input = document.getElementById("inputtextbox").value;
        var lines = input.split("\n");

        var checkboxes = document.querySelectorAll('input[type="checkbox"]');

        // reset all first
        checkboxes.forEach(function(cb){
            cb.checked = false;
            counts[cb.value] = 1;
            
            var countElement = document.getElementById("count-" + cb.value);
            if(countElement){
                countElement.textContent = 1;
            }
        });

        lines.forEach(function(line){
            line = line.trim();

            if(line === "") return;

            var match = line.match(/^(.*?)(?:\s*\((\d+)\))?$/);

            if(match){
                
                var item = match[1];
                var count = match[2] ? parseInt(match[2]) : 1;

                checkboxes.forEach(function(cb){

                    if (cb.value === item){

                        cb.checked = true;
                        counts[item] = count;

                        var countElement = document.getElementById("count-" + item);
                        if (countElement) {
                            countElement.textContent = count;
                        }
                    }
                });
            }
        });

        updateTextbox();
    }

    function copyToClipboard() {
        var textbox = document.getElementById('textbox');
        navigator.clipboard.writeText(textbox.value);
    }
    </script>
